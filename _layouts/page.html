---
layout: base
---
<div class="page-content">
  <div class="page-inner">
    {% if page.title %}
    <div class="page-header">
      <h1 class="page-title">{{ page.title }}</h1>
      {% if page.subtitle %}<p class="page-subtitle">{{ page.subtitle }}</p>{% endif %}
    </div>
    {% endif %}
    {{ content }}
  </div>
</div>
