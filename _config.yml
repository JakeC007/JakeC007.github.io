# Jake Chanenson — jakec007.github.io

title: Jake Chanenson
description: "CS PhD Student at the University of Chicago researching HCI, childrens' privacy, and AI safety."
author: G. Jake Chanenson

rss-description: "Jake Chanenson — HCI researcher working on childrens' privacy and AI safety."

social-network-links:
  email: "jchanen1@uchicago.edu"
  github: JakeC007
  rss: true

url-pretty: "jakec007.github.io"
title-on-all-pages: true
excerpt_length: 50
feed_show_excerpt: true
feed_show_tags: true

date_format: "%B %-d, %Y"
timezone: "America/Chicago"
markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title/
paginate: 5
paginate_path: "/blog/page:num/"

kramdown:
  input: GFM

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: false
      social-share: false
  - scope:
      path: ""
    values:
      layout: "page"

exclude:
  - CHANGELOG.md
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - screenshot.png
  - docs/
  - beautiful-jekyll-theme.gemspec

plugins:
  - jekyll-paginate
  - jekyll-sitemap
